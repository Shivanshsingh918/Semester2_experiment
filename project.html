<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eaeded;
}

.navbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:#ff9900;
}

.search{
    width:50%;
    padding:10px;
    border:none;
    border-radius:4px;
}

.cart{
    font-size:18px;
    font-weight:bold;
}

.hero{
    background:linear-gradient(to right,#232f3e,#37475a);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:5px;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:green;
    font-size:20px;
    margin:10px 0;
}

.card button{
    background:#ffd814;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.card button:hover{
    background:#f7ca00;
}

.cart-section{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:10px;
}

.cart-item{
    margin:10px 0;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">amazon</div>

    <input
        type="text"
        id="search"
        class="search"
        placeholder="Search products..."
    >

    <div class="cart">
        🛒 Cart: <span id="cartCount">0</span>
    </div>
</div>

<div class="hero">
    <h1>Welcome to Amazon Clone</h1>
    <p>Shop Electronics & Accessories</p>
</div>

<div class="products" id="products"></div>

<div class="cart-section">
    <h2>Cart Items</h2>
    <div id="cartItems"></div>
    <h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>

const products = [
{
id:1,
name:"Laptop",
price:55000,
image:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=500"
},
{
id:2,
name:"Smartphone",
price:25000,
image:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500"
},
{
id:3,
name:"Headphones",
price:1999,
image:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
},
{
id:4,
name:"Keyboard",
price:1499,
image:"https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=500"
},
{
id:5,
name:"Mouse",
price:999,
image:"https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=500"
},
{
id:6,
name:"Speaker",
price:2999,
image:"https://images.unsplash.com/photo-1545454675-3531b543be5d?w=500"
}
];

let cart = [];

const productsContainer =
document.getElementById("products");

function displayProducts(data){

productsContainer.innerHTML="";

data.forEach(product=>{

productsContainer.innerHTML += `
<div class="card">
<img src="${product.image}">
<h3>${product.name}</h3>
<p>₹${product.price}</p>
<button onclick="addToCart(${product.id})">
Add To Cart
</button>
</div>
`;

});

}

function addToCart(id){

const item =
products.find(product=>product.id===id);

cart.push(item);

updateCart();

}

function updateCart(){

document.getElementById("cartCount")
.innerText = cart.length;

let total = 0;

const cartItems =
document.getElementById("cartItems");

cartItems.innerHTML = "";

cart.forEach(item=>{

total += item.price;

cartItems.innerHTML += `
<div class="cart-item">
${item.name} - ₹${item.price}
</div>
`;

});

document.getElementById("total")
.innerText = total;

}

document.getElementById("search")
.addEventListener("input",function(){

const value =
this.value.toLowerCase();

const filtered =
products.filter(product=>
product.name.toLowerCase()
.includes(value)
);

displayProducts(filtered);

});

displayProducts(products);

</script>

</body>
</html>
