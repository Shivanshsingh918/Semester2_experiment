<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>experiment 02</title>
    <link rel="stylesheet" href="experiment2.css">
</head>
<style>
    .container {
        max-width: 400px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        text-align: center;
    }
    
    input[type="text"], input[type="number"] {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    
    button {
        padding: 10px 20px;
        background-color: #007BFF;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
    }
    
    button:hover {
        background-color: #0056b3;
    }
    
    #output {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
<body>  

<div class="container">

<h2>Employee Management System</h2>

<input type="text" id="name" placeholder="Employee Name">
<input type="text" id="empId" placeholder="Employee ID">
<input type="number" id="salary" placeholder="Salary">
<input type="text" id="dept" placeholder="Department">

<button onclick="addEmployee()">Add Employee</button>

<button onclick="displayEmployees()">Display All</button>

<button onclick="filterSalary()">Salary > 50000</button>

<button onclick="totalSalary()">Total Salary</button>

<button onclick="averageSalary()">Average Salary</button>

<button onclick="countDepartment()">Count by Department</button>

<div id="output"></div>

</div>

<script src="experiment2.js">script</script>
</body>
</html>
